<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.13 - Ahorro Anual</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <a href="../index.html" class="btn-volver">🏠 Inicio</a>
        <h1>💰 Ahorro Anual</h1>
        <p class="description">Calcula el ahorro anual (15% del sueldo semanal, 4 semanas/mes)</p>
        
        <div class="form-group">
            <label for="sueldoSemanal">Sueldo semanal ($):</label>
            <input type="number" id="sueldoSemanal" placeholder="Ej: 2500" step="0.01">
        </div>
        
        <button onclick="calcular()">Calcular Ahorro</button>
        
        <div id="resultado" class="resultado"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
