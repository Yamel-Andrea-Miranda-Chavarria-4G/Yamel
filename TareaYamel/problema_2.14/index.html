<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.14 - Monto Cheque Viaje</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <a href="../index.html" class="btn-volver">🏠 Inicio</a>
        <h1>✈️ Cheque de Viaje</h1>
        <p class="description">Calcula el monto del cheque para viaje a Monterrey (hotel + comida + $100 diarios)</p>
        
        <div class="form-group">
            <label for="dias">Número de días:</label>
            <input type="number" id="dias" placeholder="Ej: 5" min="1">
        </div>
        
        <div class="form-group">
            <label for="costoHotel">Costo de hotel por día ($):</label>
            <input type="number" id="costoHotel" placeholder="Ej: 800" step="0.01">
        </div>
        
        <div class="form-group">
            <label for="costoComida">Costo de comida por día ($):</label>
            <input type="number" id="costoComida" placeholder="Ej: 350" step="0.01">
        </div>
        
        <button onclick="calcular()">Calcular Cheque</button>
        
        <div id="resultado" class="resultado"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
