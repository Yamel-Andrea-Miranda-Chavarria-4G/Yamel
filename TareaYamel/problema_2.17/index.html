<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.17 - Promedio Ponderado</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <a href="../index.html" class="btn-volver">🏠 Inicio</a>
        <h1>📊 Promedio Ponderado</h1>
        <p class="description">Examen 1 y 2: 25% cada uno | Examen 3: 50%</p>
        
        <div class="form-group">
            <label for="examen1">Calificación Examen 1 (25%):</label>
            <input type="number" id="examen1" placeholder="0 - 100" min="0" max="100" step="0.1">
        </div>
        
        <div class="form-group">
            <label for="examen2">Calificación Examen 2 (25%):</label>
            <input type="number" id="examen2" placeholder="0 - 100" min="0" max="100" step="0.1">
        </div>
        
        <div class="form-group">
            <label for="examen3">Calificación Examen 3 (50%):</label>
            <input type="number" id="examen3" placeholder="0 - 100" min="0" max="100" step="0.1">
        </div>
        
        <button onclick="calcular()">Calcular Promedio</button>
        
        <div id="resultado" class="resultado"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
