<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.15 - Potencia Eléctrica</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <a href="../index.html" class="btn-volver">🏠 Inicio</a>
        <h1>⚡ Potencia Eléctrica</h1>
        <p class="description">Calcula la potencia: P = V × I y V = R × I</p>
        
        <div class="form-group">
            <label for="resistencia">Resistencia (R) en Ohms (Ω):</label>
            <input type="number" id="resistencia" placeholder="Ej: 10" step="0.01">
        </div>
        
        <div class="form-group">
            <label for="corriente">Corriente (I) en Amperes (A):</label>
            <input type="number" id="corriente" placeholder="Ej: 2" step="0.01">
        </div>
        
        <button onclick="calcular()">Calcular Potencia</button>
        
        <div id="resultado" class="resultado"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
